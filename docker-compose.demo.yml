version: '3.8'

x-db-env: &db_env
  POSTGRES_USER: $PG_USER
  POSTGRES_PASSWORD: $PG_PASSWORD
  POSTGRES_DB: $PG_DB

x-backend-env: &backend_env
  METRICS_TOKEN: $METRICS_TOKEN
  TESTING: false
  DB_USER: $PG_USER
  DB_PASSWORD: $PG_PASSWORD
  DB_NAME: $PG_DB
  DB_HOST: db
  DB_PORT: 5432
  REDIS_HOST: redis
  REDIS_PORT: 6379
  REDIS_DB: 0
  JWT_SECRET_KEY: $JWT_SECRET_KEY
  MAIL_USERNAME: $MAIL_USERNAME
  MAIL_PASSWORD: $MAIL_PASSWORD
  MAIL_FROM: $MAIL_FROM
  MAIL_PORT: $MAIL_PORT
  MAIL_SERVER: $MAIL_SERVER
  MAIL_STARTTLS: $MAIL_STARTTLS
  MAIL_SSL_TLS: $MAIL_SSL_TLS
  MAIL_USE_CREDENTIALS: $MAIL_USE_CREDENTIALS
  MAIL_VALIDATE_CERTS: $MAIL_VALIDATE_CERTS

services:
  webserver:
    image: nginx:latest
    container_name: nginx_production
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      api:
        condition: service_healthy

  db:
    image: postgres:16.3-alpine3.20
    container_name: db
    environment: *db_env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: eqalpha/keydb:x86_64_v6.3.4
    container_name: redis
    healthcheck:
      test: ["CMD", "keydb-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: backend
    container_name: fastapi_api
    command: uvicorn src.app:app --host 0.0.0.0 --port 8000
    environment: *backend_env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/healthcheck', timeout=2)" ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  taskiq_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: backend
    container_name: taskiq_worker
    command: taskiq worker src.core.tiq:broker -fsd
    environment: *backend_env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  taskiq_scheduler:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: backend
    container_name: taskiq_scheduler
    command: taskiq scheduler src.core.tiq:scheduler --update-interval 5
    environment: *backend_env
    depends_on:
      redis:
        condition: service_healthy

volumes:
  postgres_data:
