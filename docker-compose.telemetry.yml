secrets:
  metrics_token:
    environment: "METRICS_TOKEN"

services:
  prometheus:
    image: prom/prometheus:v3.12.0
    container_name: prometheus
    secrets:
      - metrics_token
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
    volumes:
      - ./backend/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      api:
        condition: service_healthy
    networks:
      - backend_network
    healthcheck:
      test: [ "CMD", "nc", "-z", "localhost", "9090" ]
      interval: 10s
      timeout: 5s
      retries: 3

  grafana:
    image: grafana/grafana:13.0.2
    container_name: grafana
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      prometheus:
        condition: service_healthy
    networks:
      - backend_network
      - frontend_network
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:3000/api/health" ]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  prometheus_data:
  grafana_data:

networks:
  backend_network:
  frontend_network:
